name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Create environment
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"
      - name: Ruff
        run: uv run ruff check flask_rls tests
      - name: Mypy
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Create environment
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[test]"
      # Integration tests spin up PostgreSQL via Testcontainers; Docker is available
      # on GitHub-hosted Ubuntu runners out of the box.
      - name: Test
        run: uv run pytest --cov=flask_rls --cov-report=term-missing
