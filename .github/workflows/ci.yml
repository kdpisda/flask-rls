name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Install
        run: uv pip install --system -e ".[dev]"
      - name: Ruff
        run: ruff check flask_rls tests
      - name: Mypy
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install
        run: uv pip install --system --python ${{ matrix.python-version }} -e ".[test]"
      # Integration tests spin up PostgreSQL via Testcontainers; Docker is available
      # on GitHub-hosted Ubuntu runners out of the box.
      - name: Test
        run: pytest --cov=flask_rls --cov-report=term-missing
